name: Upstream Drift

# Vendored libraries under vendor/ are pinned in vendor.yaml. This job asks each
# upstream whether it has moved past our pin, and opens one tracking issue per
# library that has. Nothing is ever synced automatically -- a human reviews the
# issue, runs scripts/vendor_sync.py, and moves the pin forward deliberately.

on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check upstreams for drift
        id: check
        run: |
          python3 scripts/check_drift.py            # human-readable, for the log
          python3 scripts/check_drift.py --json > drift.json

      - name: Open or update a tracking issue per drifted library
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('drift.json', 'utf8'));
            const LABEL = 'upstream-drift';

            // Ensure the label exists (no-op if it already does).
            try {
              await github.rest.issues.createLabel({
                ...context.repo, name: LABEL, color: 'fbca04',
                description: 'A vendored upstream library has moved past our pin',
              });
            } catch (e) {
              if (e.status !== 422) throw e;   // 422 = already exists
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo, state: 'open', labels: LABEL, per_page: 100,
            });

            for (const r of results) {
              if (r.unreachable) {
                core.warning(`${r.name}: upstream unreachable`);
                continue;
              }
              if (!r.drifted) continue;

              const title = `${r.name}: upstream has moved past our pin`;
              const compare = r.upstream.replace(/\.git$/, '') +
                              `/compare/${r.pinned}...${r.tip}`;
              const body = [
                `\`${r.name}\` has drifted from the commit we vendored.`,
                ``,
                `| | |`,
                `| --- | --- |`,
                `| **Upstream** | ${r.upstream} |`,
                `| **Tracked ref** | \`${r.ref}\` |`,
                `| **Our pin** | \`${r.pinned}\` |`,
                `| **Upstream tip** | \`${r.tip}\` |`,
                ``,
                `[**Review the upstream diff**](${compare})`,
                ``,
                `### To integrate`,
                ``,
                '```bash',
                `python3 scripts/vendor_sync.py ${r.name} --check   # preview the commits`,
                `python3 scripts/vendor_sync.py ${r.name}           # three-way merge; local edits preserved`,
                '```',
                ``,
                `Then review the diff and commit. Any local modifications to the vendored`,
                `tree are merged, not overwritten; genuine conflicts are reported and the`,
                `pin is left untouched until you resolve them.`,
                ``,
                `_Nothing is synced automatically. This issue is a prompt, not an action._`,
              ].join('\n');

              const prior = existing.find(i => i.title === title);
              if (prior) {
                // Refresh the body so the tip SHA stays current; don't spam comments.
                await github.rest.issues.update({
                  ...context.repo, issue_number: prior.number, body,
                });
                core.info(`${r.name}: refreshed issue #${prior.number}`);
              } else {
                const { data } = await github.rest.issues.create({
                  ...context.repo, title, body, labels: [LABEL],
                });
                core.info(`${r.name}: opened issue #${data.number}`);
              }
            }
